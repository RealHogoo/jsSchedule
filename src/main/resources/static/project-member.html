<!doctype html>
<html lang="ko">
<head>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 사용자</title>
    <link rel="stylesheet" href="/css/common.css?v=20260505-1">
</head>
<body class="schedule-page task-page-compact">
    <main class="workspace-shell">
        <aside class="workspace-sidebar panel" id="workspaceSidebar">
            <div class="brand-block">
                <div class="brand-topline">
                    <div>
                        <div class="login-eyebrow">일정 서비스</div>
                        <h1 class="workspace-title">프로젝트</h1>
                    </div>
                    <button type="button" id="btnSidebarToggle" class="sidebar-toggle" aria-expanded="false" aria-controls="sidebarCollapsible">메뉴</button>
                </div>
                <p class="workspace-desc">프로젝트에 포함할 사용자를 관리합니다.</p>
            </div>

            <div id="sidebarCollapsible" class="sidebar-collapsible">
                <nav class="workspace-nav" aria-label="서비스 메뉴">
                    <a class="nav-link is-active" href="/project.html">프로젝트</a>
                    <a class="nav-link" href="/dashboard.html">대시보드</a>
                    <a class="nav-link" href="/schedule.html">일정</a>
                    <a class="nav-link" href="/calendar.html">캘린더</a>
                </nav>

                <div class="sidebar-body">
                    <section class="sidebar-section">
                        <div class="section-label">현재 사용자</div>
                        <dl id="currentUser" class="compact-info-list"></dl>
                    </section>
                </div>

                <div class="sidebar-footer">
                    <div class="btns sidebar-actions">
                        <button type="button" id="btnReload" class="btn">새로고침</button>
                        <button type="button" id="btnLogout" class="btn btn-danger">로그아웃</button>
                    </div>
                </div>
            </div>
        </aside>

        <section class="workspace-main">
            <section class="project-layout is-single">
                <div class="project-primary">
                    <section class="panel project-table-panel">
                        <div class="table-head">
                            <div>
                                <div class="panel-title">프로젝트 사용자</div>
                                <div class="selected-project-inline compact-selection">
                                    <span class="task-selection-label">현재 기준</span>
                                    <strong id="selectedProjectName">프로젝트를 불러오는 중입니다.</strong>
                                </div>
                            </div>
                            <div class="btns">
                                <button type="button" id="btnBackToProjects" class="btn">프로젝트 목록</button>
                                <button type="button" id="btnOpenTasks" class="btn">태스크</button>
                                <button type="button" id="btnAddMember" class="btn btn-primary">사용자 추가</button>
                            </div>
                        </div>
                        <div id="memberActionMsg" class="form-msg" aria-live="polite"></div>
                        <div id="projectSummary" class="project-meta"></div>
                    </section>

                    <section class="panel project-table-panel">
                        <div class="table-head">
                            <div>
                                <div class="panel-title">포함 사용자</div>
                                <p class="table-copy">이 목록의 사용자를 태스크 담당자로 지정할 수 있습니다.</p>
                            </div>
                        </div>
                        <div id="memberRows" class="member-card-list">
                            <div class="detail-empty">사용자를 불러오는 중입니다.</div>
                        </div>
                    </section>
                </div>
            </section>
        </section>
    </main>

    <div id="memberModal" class="modal-backdrop" hidden>
        <div class="modal-panel">
            <div class="detail-head">
                <div>
                    <div class="panel-title">사용자 추가</div>
                    <p class="table-copy">어드민에 등록된 활성 사용자를 검색해서 프로젝트에 포함합니다.</p>
                </div>
                <button type="button" id="btnCloseMemberModal" class="btn">닫기</button>
            </div>

            <div class="picker-search">
                <input id="memberKeyword" class="input" type="text" placeholder="사용자명 또는 아이디 검색">
                <button type="button" id="btnSearchMember" class="btn btn-primary">검색</button>
            </div>

            <div id="memberCandidateList" class="manager-list"></div>
        </div>
    </div>

    <script src="/js/ux.js?v=20260505-1"></script>
    <script src="/js/project-member.js?v=20260505-1"></script>
</body>
</html>
