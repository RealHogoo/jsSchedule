<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>schedule-service project task workspace</title>
    <link rel="stylesheet" href="/css/common.css?v=20260410-4">
</head>
<body class="schedule-page task-page-compact">
    <main class="workspace-shell">
        <aside class="workspace-sidebar panel" id="workspaceSidebar">
            <div class="brand-block">
                <div class="brand-topline">
                    <div>
                        <div class="login-eyebrow">SCHEDULE SERVICE</div>
                        <h1 class="workspace-title">Project Task Workspace</h1>
                    </div>
                    <button type="button" id="btnSidebarToggle" class="sidebar-toggle" aria-expanded="false" aria-controls="sidebarCollapsible">메뉴</button>
                </div>
                <p class="workspace-desc">프로젝트 상세 화면에서 태스크를 등록하고 수정하는 관리 화면입니다.</p>
            </div>

            <div id="sidebarCollapsible" class="sidebar-collapsible">
                <nav class="workspace-nav" aria-label="서비스 메뉴">
                    <a class="nav-link" href="/project.html">프로젝트</a>
                    <a class="nav-link" href="/schedule.html">일정</a>
                </nav>

                <div class="sidebar-body">
                    <section class="sidebar-section">
                        <div class="section-label">현재 사용자</div>
                        <dl id="currentUser" class="compact-info-list"></dl>
                    </section>

                    <section class="sidebar-section">
                        <div class="section-label">요약</div>
                        <div id="summaryCards" class="summary-cards"></div>
                    </section>
                </div>

                <div class="sidebar-footer">
                    <div class="btns sidebar-actions">
                        <button type="button" id="btnReload" class="btn">새로고침</button>
                        <button type="button" id="btnLogout" class="btn btn-danger">로그아웃</button>
                    </div>
                </div>
            </div>
        </aside>

        <section class="workspace-main">
            <section class="project-layout is-single">
                <div class="project-primary">
                    <section class="panel project-table-panel">
                        <div class="table-head">
                            <div>
                                <div class="panel-title">선택 프로젝트</div>
                                <div class="selected-project-inline compact-selection">
                                    <span class="task-selection-label">현재 기준</span>
                                    <strong id="selectedProjectName">프로젝트를 불러오는 중입니다.</strong>
                                </div>
                            </div>
                            <div class="btns">
                                <button type="button" id="btnBackToProjects" class="btn">프로젝트 목록</button>
                                <button type="button" id="btnOpenProject" class="btn">프로젝트 정보</button>
                                <button type="button" id="btnNewTask" class="btn btn-primary">태스크 등록</button>
                            </div>
                        </div>

                        <div id="taskActionMsg" class="form-msg" aria-live="polite"></div>
                        <div id="projectSummary" class="project-meta">
                            <span>프로젝트 요약을 불러오는 중입니다.</span>
                        </div>
                    </section>

                    <section class="panel project-table-panel inline-task-panel">
                        <div class="table-head inline-workspace-head">
                            <div>
                                <div id="taskWorkspaceTitle" class="panel-title">프로젝트 태스크 목록</div>
                                <p id="taskWorkspaceSubtitle" class="compact-head-note">카드 단위로 태스크를 확인하고 상세를 펼쳐 수정할 수 있습니다.</p>
                            </div>
                            <div class="btns">
                                <button type="button" id="btnBackToTaskListInline" class="btn" hidden>목록으로</button>
                            </div>
                        </div>

                        <div id="taskListSection">
                            <div id="taskRows" class="task-card-list">
                                <div class="detail-empty">태스크를 불러오는 중입니다.</div>
                            </div>
                        </div>

                        <div id="taskFormSection" hidden>
                            <form id="taskForm" class="project-form">
                                <input type="hidden" id="taskId">
                                <input type="hidden" id="taskProjectId">

                                <div class="detail-form-grid">
                                    <div class="form-item">
                                        <label for="taskProjectName">프로젝트</label>
                                        <input id="taskProjectName" class="input" type="text" readonly>
                                    </div>

                                    <div class="form-item">
                                        <label for="taskAssigneeDisplay">담당자</label>
                                        <input id="taskAssigneeUserId" type="hidden">
                                        <div class="picker-row">
                                            <input id="taskAssigneeDisplay" class="input" type="text" placeholder="사용자를 선택하세요" readonly>
                                            <button type="button" id="btnPickAssignee" class="btn">선택</button>
                                        </div>
                                    </div>
                                </div>

                                <div class="form-item">
                                    <label for="taskTitle">태스크명</label>
                                    <input id="taskTitle" class="input" type="text" placeholder="태스크명을 입력하세요">
                                </div>

                                <div class="form-item">
                                    <label for="taskParentTaskId">상위 태스크</label>
                                    <select id="taskParentTaskId" class="input">
                                        <option value="">상위 태스크 없음</option>
                                    </select>
                                    <small class="field-hint">루트 포함 최대 4레벨까지만 등록할 수 있습니다.</small>
                                </div>

                                <div class="detail-form-grid">
                                    <div class="form-item">
                                        <label for="taskStatus">상태</label>
                                        <select id="taskStatus" class="input">
                                            <option value="TODO">TODO</option>
                                            <option value="IN_PROGRESS">IN_PROGRESS</option>
                                            <option value="DONE">DONE</option>
                                            <option value="HOLD">HOLD</option>
                                        </select>
                                    </div>

                                    <div class="form-item">
                                        <label for="taskPriority">우선순위</label>
                                        <select id="taskPriority" class="input">
                                            <option value="HIGH">HIGH</option>
                                            <option value="MEDIUM">MEDIUM</option>
                                            <option value="LOW">LOW</option>
                                        </select>
                                    </div>
                                </div>

                                <div id="taskPlanDateSection" class="detail-form-grid">
                                    <div class="form-item">
                                        <label id="taskStartDateLabel" for="taskStartDate">시작일</label>
                                        <input id="taskStartDate" class="input" type="date">
                                    </div>

                                    <div class="form-item">
                                        <label id="taskDueDateLabel" for="taskDueDate">마감일</label>
                                        <input id="taskDueDate" class="input" type="date">
                                    </div>
                                </div>

                                <div id="taskActualDateSection" class="detail-form-grid" hidden>
                                    <div class="form-item">
                                        <label for="taskActualStartDate">실제 시작일</label>
                                        <input id="taskActualStartDate" class="input" type="date">
                                    </div>

                                    <div class="form-item">
                                        <label for="taskActualEndDate">실제 종료일</label>
                                        <input id="taskActualEndDate" class="input" type="date">
                                    </div>
                                </div>

                                <div id="taskBlogFieldSection" class="detail-form-grid" hidden>
                                    <div class="form-item">
                                        <label for="taskUrl">주소(도로명주소)</label>
                                        <input id="taskUrl" class="input" type="text" placeholder="도로명주소를 입력하세요">
                                    </div>

                                    <div class="form-item">
                                        <label for="taskSupportAmount">지원금액</label>
                                        <input id="taskSupportAmount" class="input" type="number" min="0" step="1000" placeholder="0">
                                    </div>

                                    <div class="form-item">
                                        <label for="taskActualAmount">사용금액</label>
                                        <input id="taskActualAmount" class="input" type="number" min="0" step="1000" placeholder="0">
                                    </div>
                                </div>

                                <div id="taskProgressSection" class="form-item">
                                    <label for="taskProgressRate">진행률</label>
                                    <div class="range-field">
                                        <input id="taskProgressRate" class="range-input" type="range" min="0" max="100" step="5" value="0">
                                        <div class="range-meta">
                                            <span>0%</span>
                                            <strong id="taskProgressRateValue">0%</strong>
                                            <span>100%</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="form-item">
                                    <label for="taskDescription">설명</label>
                                    <textarea id="taskDescription" class="input textarea" rows="6" placeholder="태스크 설명을 입력하세요"></textarea>
                                </div>

                                <div id="taskMeta" class="project-meta"></div>
                                <div id="taskFormMsg" class="form-msg" aria-live="polite"></div>

                                <div class="detail-actions">
                                    <button type="button" id="btnCancelTaskInline" class="btn">취소</button>
                                    <button type="button" id="btnSaveTaskInline" class="btn btn-primary">저장</button>
                                </div>
                            </form>
                        </div>
                    </section>
                </div>
            </section>
        </section>
    </main>

    <div id="assigneeModal" class="modal-backdrop" hidden>
        <div class="modal-panel">
            <div class="detail-head">
                <div>
                    <div class="panel-title">담당자 선택</div>
                    <p class="table-copy">사용자명 또는 아이디로 검색해 선택합니다.</p>
                </div>
                <button type="button" id="btnCloseAssigneeModal" class="btn">닫기</button>
            </div>

            <div class="picker-search">
                <input id="assigneeKeyword" class="input" type="text" placeholder="사용자명 또는 아이디 검색">
                <button type="button" id="btnSearchAssignee" class="btn btn-primary">검색</button>
            </div>

            <div id="assigneeList" class="manager-list"></div>
        </div>
    </div>

    <script src="/js/ux.js?v=20260410-4"></script>
    <script src="/js/task-form.js?v=20260410-4"></script>
</body>
</html>
