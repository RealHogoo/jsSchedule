<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정</title>
    <link rel="stylesheet" href="/css/common.css">
</head>
<body class="schedule-page">
    <main class="workspace-shell">
        <aside class="workspace-sidebar panel" id="workspaceSidebar">
            <div class="brand-block">
                <div class="brand-topline">
                    <div>
                        <div class="login-eyebrow">일정 서비스</div>
                        <h1 class="workspace-title">일정</h1>
                    </div>
                    <button type="button" id="btnSidebarToggle" class="sidebar-toggle" aria-expanded="false" aria-controls="sidebarCollapsible">메뉴</button>
                </div>
            </div>

            <div id="sidebarCollapsible" class="sidebar-collapsible">
                <nav class="workspace-nav" aria-label="서비스 메뉴">
                    <a class="nav-link" href="/project.html">프로젝트</a>
                    <a class="nav-link" href="/dashboard.html">대시보드</a>
                    <a class="nav-link is-active" href="/schedule.html">일정</a>
                    <a class="nav-link" href="/calendar.html">캘린더</a>
                </nav>

                <div class="sidebar-body">
                    <section class="sidebar-section">
                        <div class="section-label">현재 사용자</div>
                        <dl id="currentUser" class="compact-info-list"></dl>
                    </section>

                    <section class="sidebar-section">
                        <div class="section-label">요약</div>
                        <div id="summaryCards" class="summary-cards"></div>
                    </section>
                </div>

                <div class="sidebar-footer">
                    <div class="btns sidebar-actions">
                        <button type="button" id="btnReload" class="btn">새로고침</button>
                        <button type="button" id="btnLogout" class="btn btn-danger">로그아웃</button>
                    </div>
                </div>
            </div>
        </aside>

        <section class="workspace-main">
            <header class="workspace-hero panel workspace-hero-with-help">
                <div>
                    <div class="hero-kicker">일정</div>
                    <h2 class="workspace-heading">내 태스크 일정 관리</h2>
                </div>
                <div class="workspace-help-actions">
                    <details class="page-help page-help-static">
                        <summary><span class="page-help-toggle">?</span></summary>
                        <div class="page-help-body">
                            <div class="page-help-section">
                                <strong>화면 설명</strong>
                                <p>내가 맡은 태스크만 모아서 보는 개인 일정 화면입니다.</p>
                            </div>
                            <div class="page-help-section">
                                <strong>기능 설명</strong>
                                <p>로그인한 사용자의 담당 태스크만 보여주고, 프로젝트 관리 화면으로 바로 이동할 수 있습니다.</p>
                            </div>
                        </div>
                    </details>
                </div>
            </header>

            <section class="panel project-filter-panel">
                <div class="panel-title">조회 조건</div>
                <div class="project-filters">
                    <div class="form-item">
                        <label for="filterKeyword">키워드</label>
                        <input id="filterKeyword" class="input" type="text" placeholder="태스크명 또는 프로젝트명">
                    </div>
                    <div class="form-item">
                        <label for="filterStatus">상태</label>
                        <select id="filterStatus" class="input">
                            <option value="">전체</option>
                            <option value="TODO">할 일</option>
                            <option value="IN_PROGRESS">진행 중</option>
                            <option value="DONE">완료</option>
                            <option value="HOLD">보류</option>
                        </select>
                    </div>
                    <div class="btns filter-actions">
                        <button type="button" id="btnSearch" class="btn btn-primary">조회</button>
                        <button type="button" id="btnReset" class="btn">초기화</button>
                    </div>
                </div>
            </section>

            <section class="panel project-table-panel">
                <div class="table-head">
                    <div>
                        <div class="panel-title">내 태스크 목록</div>
                        <p class="table-copy">담당자로 지정된 태스크만 표시합니다.</p>
                    </div>
                </div>

                <div id="taskActionMsg" class="form-msg" aria-live="polite"></div>

                <div class="table-wrap">
                    <table class="data-table task-table">
                        <thead>
                            <tr>
                                <th>프로젝트</th>
                                <th>태스크</th>
                                <th>상태</th>
                                <th>우선순위</th>
                                <th>기간</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="taskRows">
                            <tr>
                                <td colspan="6" class="empty-row">내 태스크를 불러오는 중입니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>

    <script src="/js/ux.js"></script>
    <script src="/js/task.js"></script>
</body>
</html>
