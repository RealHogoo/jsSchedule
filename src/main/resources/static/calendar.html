<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캘린더</title>
    <link rel="stylesheet" href="/css/common.css?v=20260411-3">
</head>
<body class="schedule-page calendar-page">
    <main class="workspace-shell">
        <aside class="workspace-sidebar panel" id="workspaceSidebar">
            <div class="brand-block">
                <div class="brand-topline">
                    <div>
                        <div class="login-eyebrow">일정 서비스</div>
                        <h1 class="workspace-title">캘린더</h1>
                    </div>
                    <button type="button" id="btnSidebarToggle" class="sidebar-toggle" aria-expanded="false" aria-controls="sidebarCollapsible">메뉴</button>
                </div>
                <p class="workspace-desc">내가 담당하는 태스크를 월간 캘린더로 확인합니다.</p>
            </div>

            <div id="sidebarCollapsible" class="sidebar-collapsible">
                <nav class="workspace-nav" aria-label="서비스 메뉴">
                    <a class="nav-link" href="/project.html">프로젝트</a>
                    <a class="nav-link" href="/dashboard.html">대시보드</a>
                    <a class="nav-link" href="/schedule.html">일정</a>
                    <a class="nav-link is-active" href="/calendar.html">캘린더</a>
                </nav>

                <div class="sidebar-body">
                    <section class="sidebar-section">
                        <div class="section-label">현재 사용자</div>
                        <dl id="currentUser" class="compact-info-list"></dl>
                    </section>

                    <section class="sidebar-section">
                        <div class="section-label">요약</div>
                        <div id="summaryCards" class="summary-cards"></div>
                    </section>
                </div>

                <div class="sidebar-footer">
                    <div class="btns sidebar-actions">
                        <button type="button" id="btnReload" class="btn">새로고침</button>
                        <button type="button" id="btnLogout" class="btn btn-danger">로그아웃</button>
                    </div>
                </div>
            </div>
        </aside>

        <section class="workspace-main">
            <header class="workspace-hero panel calendar-hero">
                <div>
                <div class="hero-kicker">캘린더</div>
                    <h2 class="workspace-heading">내 태스크 캘린더</h2>
                    <p class="workspace-copy">로그인 사용자에게 배정된 태스크를 날짜 기준으로 모아봅니다.</p>
                </div>
                <div class="calendar-hero-actions">
                    <button type="button" id="btnToday" class="btn btn-primary">오늘</button>
                </div>
            </header>

            <section class="panel project-filter-panel">
                <div class="panel-title">조회 조건</div>
                <div class="project-filters schedule-filters">
                    <div class="form-item">
                        <label for="filterKeyword">키워드</label>
                        <input id="filterKeyword" class="input" type="text" placeholder="태스크명 또는 프로젝트명">
                    </div>
                    <div class="form-item">
                        <label for="filterStatus">상태</label>
                        <select id="filterStatus" class="input">
                            <option value="">전체</option>
                            <option value="TODO">TODO</option>
                            <option value="IN_PROGRESS">IN_PROGRESS</option>
                            <option value="DONE">DONE</option>
                            <option value="HOLD">HOLD</option>
                        </select>
                    </div>
                    <div class="btns filter-actions">
                        <button type="button" id="btnSearch" class="btn btn-primary">조회</button>
                        <button type="button" id="btnReset" class="btn">초기화</button>
                    </div>
                </div>
            </section>

            <section class="schedule-calendar-layout">
                <section class="panel calendar-panel">
                    <div class="calendar-toolbar">
                        <button type="button" id="btnPrevMonth" class="btn">이전</button>
                        <h3 id="calendarTitle" class="calendar-title">-</h3>
                        <button type="button" id="btnNextMonth" class="btn">다음</button>
                    </div>

                    <div id="taskActionMsg" class="form-msg" aria-live="polite"></div>
                    <div id="calendarGrid" class="calendar-grid" aria-label="월간 태스크 캘린더"></div>
                </section>

                <aside class="panel day-task-panel">
                    <div class="table-head">
                        <div>
                            <div class="panel-title">선택일 태스크</div>
                            <p id="selectedDateTitle" class="table-copy">날짜를 선택하세요.</p>
                        </div>
                    </div>
                    <div id="selectedDateTasks" class="day-task-list">
                        <div class="detail-empty">캘린더에서 날짜를 선택하면 태스크가 표시됩니다.</div>
                    </div>
                </aside>
            </section>
        </section>
    </main>

    <script src="/js/ux.js?v=20260411-2"></script>
    <script src="/js/calendar.js?v=20260411-3"></script>
</body>
</html>
